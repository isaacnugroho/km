name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release tools
        run: pip install -e ".[release]"

      - name: Validate tag matches pyproject version
        run: python scripts/validate_release_tag.py "${{ github.ref_name }}"

  test:
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Check per-file coverage threshold
        run: python scripts/check_coverage_per_file.py --min 80

  build:
    needs: [validate-tag, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: scripts/build-linux.sh
            artifact: km-linux-x86_64
          - os: windows-latest
            script: scripts/build-windows.ps1
            artifact: km-windows-x86_64.exe
          - os: macos-latest
            script: scripts/build-macos.sh
            artifact: km-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build binary (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/build-linux.sh

      - name: Build binary (macOS)
        if: runner.os == 'macOS'
        run: bash scripts/build-macos.sh

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/km-*
